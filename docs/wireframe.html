<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Expense Tracker Wireframe</title>
<style>
  body { font-family: sans-serif; background: #f5f5f5; padding: 2rem; margin: 0; }
  .container { max-width: 480px; margin: 0 auto; background: white; border: 1px solid #ddd; border-radius: 12px; padding: 1.25rem; }
  h2 { font-size: 18px; font-weight: 500; margin: 0 0 1.25rem; text-align: center; }
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.25rem; }
  .summary-card { background: #f5f5f5; border-radius: 8px; padding: 0.75rem; }
  .summary-card p { margin: 0; }
  .label { font-size: 13px; color: #666; margin-bottom: 4px; }
  .value { font-size: 16px; font-weight: 500; }
  .income { color: #1d9e75; }
  .expense { color: #e24b4a; }
  .form-section { border-top: 1px solid #eee; padding-top: 1rem; margin-bottom: 1.25rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  .radio-group { display: flex; gap: 16px; margin-bottom: 8px; font-size: 14px; }
  button { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 14px; }
  .list-title { font-size: 14px; font-weight: 500; margin: 0 0 8px; color: #666; }
  .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 6px; }
  .item-right { display: flex; align-items: center; gap: 12px; }
  .item-right button { padding: 2px 8px; font-size: 12px; width: auto; }
</style>
</head>
<body>
  <div class="container">
    <h2>Expense Tracker</h2>

    <div class="summary">
      <div class="summary-card">
        <p class="label">총수입</p>
        <p class="value income">0</p>
      </div>
      <div class="summary-card">
        <p class="label">총지출</p>
        <p class="value expense">0</p>
      </div>
      <div class="summary-card">
        <p class="label">잔액</p>
        <p class="value">0</p>
      </div>
    </div>

    <div class="form-section">
      <div class="form-row">
        <input type="text" placeholder="항목명">
        <input type="number" placeholder="금액">
      </div>
      <div class="radio-group">
        <label><input type="radio" name="type" checked> 수입</label>
        <label><input type="radio" name="type"> 지출</label>
      </div>
      <button>추가</button>
    </div>

    <div>
      <p class="list-title">거래 내역</p>
      <div class="item">
        <span>월급</span>
        <div class="item-right">
          <span class="income">+3,000,000</span>
          <button>삭제</button>
        </div>
      </div>
      <div class="item">
        <span>점심</span>
        <div class="item-right">
          <span class="expense">-8,000</span>
          <button>삭제</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
